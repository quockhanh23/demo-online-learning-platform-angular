<app-header></app-header>
<app-title message="Thông tin người dùng"></app-title>
<div class="container" style="margin-top: 10px; margin-bottom: 10px; height: 500px">
<span matTooltip="Quay lại" style="font-size: 35px; cursor: pointer;" routerLink="{{urlPage}}"
      class="material-icons hoverYellowColor">arrow_back</span>
  <hr>
  <div class="row">
    <div class="col-8">
      <div class="row">
        <div class="col-1">
          <span class="material-icons">account_box</span>
        </div>
        <div class="col-4">
          <p>Tên đăng nhập:</p>
        </div>
        <div class="col" *ngIf="rolesCheck == 'ADMIN'">
          <p>{{user?.username}}</p>
        </div>
      </div>

      <div class="row">
        <div class="col-1">
          <span class="material-icons">badge</span>
        </div>
        <div class="col-4">
          <p>Tên đầy đủ:</p>
        </div>
        <div class="col">
          <p>{{user?.fullName}}</p>
        </div>
      </div>

      <div class="row">
        <div class="col-1">
          <span class="material-icons">date_range</span>
        </div>
        <div class="col-4">
          <p>Ngày đăng kí:</p>
        </div>
        <div class="col">
          <p>{{user?.createdDate | date: 'dd/MM/yyyy'}}</p>
        </div>
      </div>

      <div class="row">
        <div class="col-1">
          <span class="material-icons">phone</span>
        </div>
        <div class="col-4">
          <p>Số điện thoại:</p>
        </div>
        <div class="col" *ngIf="rolesCheck == 'ADMIN'">
          <p>{{user?.phoneNumber}}</p>
        </div>
      </div>

      <div class="row">
        <div class="col-1">
          <span class="material-icons">email</span>
        </div>
        <div class="col-4">
          <p>Email:</p>
        </div>
        <div class="col">
          <p>{{user?.email}}</p>
        </div>
      </div>
    </div>
    <div class="col-4">
      <div style="padding-right: 20px">
        <img style="width: 100%; height: 200px; border-radius: 50%; margin-bottom: 15px"
             src="../../../assets/image/harvard.jpg">
      </div>
    </div>
  </div>
</div>
