<app-header></app-header>
<app-title message="Cập nhật khóa học"></app-title>
<div class="container" style="background-color: whitesmoke;">
     <span [routerLink]="['/']" style="font-size: 35px; cursor: pointer;"
           class="material-icons hoverYellowColor">arrow_back</span>
  <form [formGroup]="courseForm" (ngSubmit)="updateCourse()">
    <div class="row" style="margin-top: 20px; margin-bottom: 10px">
      <div class="col-6" align="left">
        <h2>Môn học:</h2>
        <input class="form-control" formControlName="courseDescription" value="{{course?.courseName}}">
      </div>
    </div>
    <div class="row">
      <div class="col-6">
        <label>Mô tả</label>
        <br>
        <input style="width: 100%" class="form-control" formControlName="courseDescription"
               value="{{course?.courseDescription}}">
      </div>
      <div class="col-6">
        <div class="row">
          <div class="col-6">
            <div style="font-size: 19px">
              <div>
                <p>Ngày bắt đầu khóa học:</p>
                <input formControlName="startDate" type="date">
              </div>
            </div>
          </div>
          <div class="col-6">
            <div style="font-size: 19px">
              <div>
                <p>Ngày kết thúc khóa học:</p>
                <input formControlName="endDate" type="date">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top: 20px;">
      <div class="col-12">
        <img style="width: 100%; height: 300px; border-radius: 5px" src="{{course?.logo}}" alt="Lỗi ảnh">
        <button style="margin-top: 20px; margin-bottom: 20px" class="btn btn-info" type="submit">
          Cập nhật thông tin
        </button>
      </div>
    </div>
  </form>
</div>
